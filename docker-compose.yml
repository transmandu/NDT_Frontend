###############################################################################
# Docker Compose - NDT Frontend (Orinoko Quality Control)
# Levanta el frontend en Next.js utilizando hot-reload.
#
# USO:
#   1. Levantar: docker compose up -d --build
#   2. Ver cambios: http://localhost:3000
#
# DETENER: docker compose down
# LOGS:    docker compose logs -f frontend
###############################################################################

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend Next.js (Node 20)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ndt_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - HOSTNAME=0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMENES PERSISTENTES
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  frontend_node_modules:
    driver: local
